spring:
  jpa:
    hibernate:
      ddl-auto: none
      naming:
        physical-strategy: org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
    properties:
      hibernate:
        default_batch_fetch_size: 30
  datasource:
    driver-class-name: net.sf.log4jdbc.sql.jdbcapi.DriverSpy
    url: jdbc:log4jdbc:mysql://${DB_URL}:${DB_PORT}/CHAM_EQUALITY
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

  cloud:
    aws:
      credentials:
        access-key: ${AWS_ACCESS_KEY}
        secret-key: ${AWS_SECRET_KEY}
      region:
        static: ${AWS_REGION}
      s3:
        bucket: ${AWS_BUCKET}

azure:
  translator:
    key: ${AZURE_TRANSLATOR_KEY}
    region: ${AZURE_TRANSLATOR_REGION}
    endpoint: ${AZURE_TRANSLATOR_ENDPOINT:https://api.cognitive.microsofttranslator.com}

apple:
  client-id: ${APPLE_CLIENT_ID:}
  issuer: https://appleid.apple.com
  jwks-uri: https://appleid.apple.com/auth/keys

auth:
  cookie:
    name: refreshToken
    secure: ${COOKIE_SECURE:true}
    path: /
    same-site: Strict
  refresh-token:
    expiry: 1d


logging:
  file:
    name: /home/cham/cham-equality-log/cham.log
    level:
      root: INFO
  logback:
    rollingpolicy:
      file-name-pattern: ${LOG_FILE}.%d{yyyy-MM-dd}.%i.log

app:
  cors-url: https://cham-monimap.com
  admin-password: ${ADMIN_PASSWORD}
  report-user-password: ${USER_PASSWORD}

data:
  api:
    key: ${DATA_API_KEY}
    base-url: https://www.safetydata.go.kr
    disaster-message-path: /V2/api/DSSP-IF-00247
    region: 대전
    page-size: 100
    timeout-millis: 5000
    sync-days: 2
  geocoding:
    api-key-id: ${NCP_API_KEY_ID}
    api-key: ${NCP_API_KEY}
    base-url: ${NCP_BASE_URL}
    geocoding-path: ${NCP_GEOCODING_PATH}
    reverse-geocoding-path: ${NCP_REVERSE_GEOCODING_PATH}

kakao:
  app:
    id: ${KAKAO_APP_ID}