name: cham-equality

on:
  push:
    branches:
      - main

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: changes
        with:
          filters: |
            backend:
              - 'chamApi/**'
            frontend:
              - 'front/**'
            app:
              - 'chamApp/**'

    outputs:
      backend: ${{ steps.changes.outputs.backend }}
      frontend: ${{ steps.changes.outputs.frontend }}
      app: ${{ steps.changes.outputs.app }}

  build-backend:
    needs: detect-changes
    if: needs.detect-changes.outputs.backend == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: 'corretto'
          java-version: '25'


      - name: gradle 권한 추가 및 빌드
        working-directory: chamApi
        run: chmod +x ./gradlew && ./gradlew clean build -x test

      - name: 빌드된 파일 이름 변경
        run: mv ./chamApi/build/libs/*SNAPSHOT.jar ./project.jar

      - name: SCP로 전송
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          password: ${{ secrets.PASSWORD }}
          port: '22'
          source: project.jar
          target: /home/cham/cham-server-research/tobe


      - name: ssh 접속
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          password: ${{ secrets.PASSWORD }}
          script_stop: true
          port: 22
          script: |
            rm -rf /home/cham/cham-server-research/target
            mkdir -p /home/cham/cham-server-research/target
            mv /home/cham/cham-server-research/tobe/project.jar /home/cham/cham-server-research/target
            cd /home/cham/cham-server-research/target
            sudo fuser -k -n tcp 8081 || true
            DB_USERNAME='${{ secrets.DB_USERNAME }}' \
            DB_PASSWORD='${{ secrets.DB_PASSWORD }}' \
            DB_URL='${{ secrets.DB_URL }}' \
            DB_PORT='${{ secrets.DB_PORT }}' \
            AWS_ACCESS_KEY='${{ secrets.AWS_ACCESS_KEY }}' \
            AWS_SECRET_KEY='${{ secrets.AWS_SECRET_KEY }}' \
            AWS_REGION='${{ secrets.AWS_REGION }}' \
            AWS_BUCKET='${{ secrets.AWS_BUCKET }}' \
            ADMIN_PASSWORD='${{ secrets.ADMIN_PASSWORD }}' \
            USER_PASSWORD='${{ secrets.USER_PASSWORD }}' \
            DATA_API_KEY='${{ secrets.DATA_API_KEY }}' \
            AZURE_TRANSLATOR_KEY='${{ secrets.AZURE_TRANSLATOR_KEY }}' \
            AZURE_TRANSLATOR_REGION='${{ secrets.AZURE_TRANSLATOR_REGION }}' \
            AZURE_TRANSLATOR_ENDPOINT='${{ secrets.AZURE_TRANSLATOR_ENDPOINT }}' \
            NCP_API_KEY_ID='${{ secrets.NCP_API_KEY_ID }}' \
            NCP_API_KEY='${{ secrets.NCP_API_KEY }}' \
            NCP_BASE_URL='${{ secrets.NCP_BASE_URL }}' \
            NCP_GEOCODING_PATH='${{ secrets.NCP_GEOCODING_PATH }}' \
            NCP_REVERSE_GEOCODING_PATH='${{ secrets.NCP_REVERSE_GEOCODING_PATH }}' \
            KAKAO_APP_ID='${{ secrets.KAKAO_APP_ID }}' \
            nohup java \
            -Dspring.profiles.active=real \
            -Dserver.port=8081 \
            -Duser.timezone=Asia/Seoul \
            -jar project.jar > /dev/null 2>&1 &
            
            rm -rf /home/cham/cham-server-research/tobe

  build-frontend:
    needs: detect-changes
    if: needs.detect-changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: npm 인스톨
        run: cd front && npm install

      - name: npm 빌드
        run: cd front && npm run build

      - name: scp로 전송
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          password: ${{ secrets.PASSWORD }}
          port: 22
          source: front/dist/*
          target: /home/cham/deploy/front-dist-temp-research

      - name: ssh 접속
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          password: ${{ secrets.PASSWORD }}
          port: 22
          script: |
            sudo rm -rf /usr/share/nginx/cham-front-research
            sudo mkdir -p /usr/share/nginx/cham-front-research
            sudo mv /home/cham/deploy/front-dist-temp-research/* /usr/share/nginx/cham-front-research/
            sudo systemctl reload nginx

  build-app:
    needs: detect-changes
    if: needs.detect-changes.outputs.app == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: chamApp/package-lock.json

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'corretto'
          java-version: '17'

      - name: npm 인스톨
        working-directory: chamApp
        run: npm ci

      - name: .env 생성 (react-native-config 빌드 타임 주입)
        working-directory: chamApp
        run: |
          cat > .env <<EOF
          API_BASE_URL=${{ secrets.APP_API_BASE_URL }}
          KAKAO_NATIVE_APP_KEY=${{ secrets.KAKAO_NATIVE_APP_KEY }}
          KAKAO_MAP_APP_KEY=${{ secrets.KAKAO_MAP_APP_KEY }}
          EOF

      - name: 업로드 keystore 복원
        run: echo "${{ secrets.UPLOAD_KEYSTORE_BASE64 }}" | base64 -d > chamApp/android/app/upload-keystore.jks

      - name: keystore.properties 생성
        run: |
          cat > chamApp/android/keystore.properties <<EOF
          CHAM_UPLOAD_STORE_FILE=upload-keystore.jks
          CHAM_UPLOAD_KEY_ALIAS=upload
          CHAM_UPLOAD_STORE_PASSWORD=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          CHAM_UPLOAD_KEY_PASSWORD=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          EOF

      - name: AAB 빌드
        working-directory: chamApp/android
        run: chmod +x ./gradlew && ./gradlew bundleRelease --no-daemon

      - name: AAB 아티팩트 업로드
        uses: actions/upload-artifact@v4
        with:
          name: app-release-aab
          path: chamApp/android/app/build/outputs/bundle/release/app-release.aab
          if-no-files-found: error